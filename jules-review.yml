name: Jules PR Review
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: write
jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: google-labs-code/jules-action@v1   # CONFIRM tag + inputs
        with:
          api-key: ${{ secrets.JULES_API_KEY }}
          mode: review                            # CONFIRM input name/values
